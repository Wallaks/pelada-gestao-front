<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Jogadores</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <h1>Cadastro de Jogadores</h1>

    <form id="cadastro-form">
      <label>Nome:</label>
      <input type="text" id="nome" required />

      <label>É goleiro?</label>
      <select id="goleiro">
        <option value="false">Não</option>
        <option value="true">Sim</option>
      </select>

      <button type="submit">Adicionar Jogador</button>
    </form>

    <h2>Lista de Jogadores</h2>
    <table id="tabela-jogadores">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Goleiro</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <label style="margin-top: 20px;">Data da Pelada:</label>
    <input type="date" id="data" />

    <button id="enviar">Enviar Jogadores</button>
    <button id="btn-sorteios">Ver Sorteios Anteriores</button>

    <h2 style="margin-top: 40px;">Sorteios Salvos</h2>
    <table id="sorteios-salvos">
      <thead>
        <tr>
          <th>Data</th>
          <th>Total de Jogadores</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
